version = 1
default_agent = "nyako"
agents_dir = "agents"
tools_dir = "tools"
hooks_dir = "hooks"
skills_dir = "skills"
memory_dir = "memory"
schedules_dir = "schedules"

[[startup_sessions]]
id = "hub_neko"
owner = "hub-neko"
title = "中枢喵"
topic = "Nyako runtime hub"
goal = "作为 Nyako 团队唯一中枢，接收 monitor-neko 和 schedules 的路由建议，并决定是否派发到业务 Session。"
state = "ready"

[agent_backend]
kind = "pi"

[runtime_loop]
schedules_enabled = true

[[skills.external]]
provider = "github"
repo = "ShigureLab/gh-llm"
skill = "github-conversation"
ref = "main"

[acp]
enabled = true

[acp.agents.codex]
enabled = true
permissions = "approve-all"
timeout = 900

[policy]
trusted_github_users = [
  "SigureMo",
  "risemeup1",
  "swgu98",
  "huangjiyi",
  "zyfncg",
  "gouzil",
  "sunzhongkai588",
  "DrRyanHuang",
  "omoYang",
  "zrr1999",
]

[policy.github_monitor]
ignored_actor_logins = ["PaddlePaddle-bot", "Paddle-CI-Bot"]

[policy.github_context]
auto_collapse_author_logins = ["PaddlePaddle-bot", "Paddle-CI-Bot"]
